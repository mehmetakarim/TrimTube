name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 3 platform işi paralel çalışıp hepsi --publish always ile aynı yeni etikete
  # release oluşturmaya çalışınca yarış durumu oluşabiliyor (bkz. v1.2.1: Windows
  # işi "başarılı" bitti ama exe'yi hiç yükleyemedi). Release'i tek bir işte,
  # matris başlamadan önce oluşturup bu riski ortadan kaldırıyoruz.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo ${{ github.repository }} \
            --draft \
            --title "${{ github.ref_name }}" \
            --notes "" \
            || echo "Release zaten var, devam ediliyor"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            fetch: fetch:win
            args: --win
          - os: macos-14 # Apple Silicon (arm64) — macos-13 (Intel) çıkarıldı: bu hesapta
            fetch: fetch:mac # runner kuyrukta saatlerce takılı kalıyor, GitHub'ın Intel Mac
            args: --mac --arm64 # runner'larını kademeli kaldırmasının bir sonucu.
          - os: ubuntu-latest
            fetch: fetch:linux
            args: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run ${{ matrix.fetch }}

      - run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
