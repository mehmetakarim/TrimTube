name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            fetch: fetch:win
            args: --win
          - os: macos-14 # Apple Silicon (arm64) — macos-13 (Intel) çıkarıldı: bu hesapta
            fetch: fetch:mac # runner kuyrukta saatlerce takılı kalıyor, GitHub'ın Intel Mac
            args: --mac --arm64 # runner'larını kademeli kaldırmasının bir sonucu.
          - os: ubuntu-latest
            fetch: fetch:linux
            args: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run ${{ matrix.fetch }}

      - run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
