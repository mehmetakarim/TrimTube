name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 3 platform işi paralel çalışıp hepsi --publish always ile aynı yeni etikete
  # release oluşturmaya çalışınca yarış durumu oluşabiliyor (bkz. v1.2.1: Windows
  # işi "başarılı" bitti ama exe'yi hiç yükleyemedi). Release'i tek bir işte,
  # matris başlamadan önce oluşturup bu riski ortadan kaldırıyoruz.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        # v1.3.0'da aynı etiket için İKİ draft oluştuğu görüldü (electron-builder
        # her işte hangi draft'ı bulursa ona yükleyince dosyalar bölünüyor).
        # Bu adım idempotent: draft yoksa bir tane oluşturur, birden fazlaysa
        # ilkini tutup fazlalıkları siler — build işleri hep tek draft bulur.
        run: |
          ids=$(gh api "repos/$REPO/releases" --paginate \
            --jq "[.[] | select(.tag_name == \"$TAG\" and .draft)] | map(.id) | @sh" | tr -d "'")
          count=$(echo $ids | wc -w)
          if [ "$count" -eq 0 ]; then
            gh release create "$TAG" --repo "$REPO" --draft --title "$TAG" --notes ""
          elif [ "$count" -gt 1 ]; then
            echo "Uyarı: $count adet draft bulundu, fazlalıklar siliniyor"
            for id in $(echo $ids | cut -d' ' -f2-); do
              gh api -X DELETE "repos/$REPO/releases/$id"
            done
          else
            echo "Draft zaten var, devam ediliyor"
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            fetch: fetch:win
            args: --win
            bindir: win
            trackerout: tracker.exe
          - os: macos-14 # Apple Silicon (arm64) — macos-13 (Intel) çıkarıldı: bu hesapta
            fetch: fetch:mac # runner kuyrukta saatlerce takılı kalıyor, GitHub'ın Intel Mac
            args: --mac --arm64 # runner'larını kademeli kaldırmasının bir sonucu.
            bindir: mac
            trackerout: tracker
          - os: ubuntu-latest
            fetch: fetch:linux
            args: --linux
            bindir: linux
            trackerout: tracker
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run ${{ matrix.fetch }}

      # Faz 10-B: kişi takibini kurulumsuz yapmak için tracker.py'yi PyInstaller ile
      # platforma özel tek çalıştırılabilir dosyaya dondur (resources/bin/<platform>).
      # GUI'siz headless OpenCV: tracker hiçbir GUI çağrısı kullanmaz; Linux'ta
      # libGL runtime bağımlılığını önler, takip çıktısı birebir aynıdır.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kişi takibi ikilisini dondur (PyInstaller)
        shell: bash
        run: |
          python -m pip install --quiet opencv-contrib-python-headless numpy pyinstaller
          python -m PyInstaller tracker.spec --clean --noconfirm
          mkdir -p "resources/bin/${{ matrix.bindir }}"
          cp "dist/${{ matrix.trackerout }}" "resources/bin/${{ matrix.bindir }}/${{ matrix.trackerout }}"
          if [ "${{ matrix.bindir }}" != "win" ]; then chmod +x "resources/bin/${{ matrix.bindir }}/${{ matrix.trackerout }}"; fi

      - run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
